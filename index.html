<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 15px; }
    .card { background: white; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 480px; margin: 0 auto 20px; overflow: hidden; position: relative; border: 1px solid #e1e8ed; transition: transform 0.2s; }
    
    .card.active { border: 2px solid #3182ce; box-shadow: 0 0 20px rgba(49, 130, 206, 0.2); }
    .card.archived { opacity: 0.7; transform: scale(0.98); }
    
    .badge-container { display: flex; gap: 5px; align-items: center; margin-left: auto; }
    .badge { font-size: 0.65em; padding: 2px 8px; border-radius: 4px; font-weight: bold; color: white; text-transform: uppercase; }
    
    .badge-live { background: #3182ce; animation: pulse 2s infinite; }
    .badge-completed { background: #38a169; }
    .badge-status-neutral { background: #718096; } 
    .badge-status-alert { background: #e53e3e; }   

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    .top-bar { background: #1a202c; color: white; padding: 12px 20px; display: flex; align-items: center; }
    .top-bar.archived-header { background: #4a5568; }
    
    .airline-brand { display: flex; align-items: center; flex-grow: 1; }
    .logo { width: 28px; height: 28px; margin-right: 12px; border-radius: 4px; object-fit: contain; background: white; padding: 2px; }
    .airline-info { font-weight: 600; font-size: 1em; margin-right: 10px; }
    
    .date-row { background: #f8fafc; padding: 8px 20px; font-size: 0.8em; color: #64748b; font-weight: bold; border-bottom: 1px solid #edf2f7; }

    .airport-row { padding: 20px 20px 5px; display: flex; justify-content: space-between; align-items: flex-end; }
    .point { display: flex; flex-direction: column; }
    .dest { text-align: right; }
    .city-code { font-size: 1.6em; font-weight: 800; color: #1e293b; line-height: 1; }
    .time { font-size: 1.1em; color: #3182ce; font-weight: bold; margin-top: 5px; }

    .progress-row { padding: 15px 25px 30px; }
    .progress-track { position: relative; width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; }
    .progress-fill { position: absolute; height: 100%; border-radius: 10px; transition: width 1s; }
    .plane-marker { position: absolute; top: -14px; transform: translateX(-50%); font-size: 1.6em; transition: left 1s; }

    .progress-fill.flying { background: #3182ce; } 
    .progress-fill.tarmac { background: #dd6b20; } 
    .progress-fill.arrived { background: #38a169; } 
    .progress-fill.cancelled { background: #e53e3e; } 

    .status-footer { text-align: center; padding: 10px; background: #f8fafc; font-size: 0.85em; font-weight: bold; color: #475569; border-top: 1px solid #edf2f7; }

    /* Archive Styling */
    #archive-wrapper { display: none; margin-top: 20px; }
    .section-divider { text-align: center; margin: 40px 0 20px; color: #64748b; font-weight: bold; font-size: 0.9em; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #cbd5e1; line-height: 0.1em; max-width: 480px; margin-left: auto; margin-right: auto; }
    .section-divider span { background:#f0f2f5; padding:0 10px; }

    .controls { text-align: center; margin-top: 20px; margin-bottom: 40px;}
    button { background: #3182ce; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1em; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    button:hover { background: #2b6cb0; transform: translateY(-1px); }
    
    .btn-secondary { background: #718096; margin-top: 10px; font-size: 0.85em; padding: 8px 16px; }
    .btn-secondary:hover { background: #4a5568; }

    .sync-text { font-size: 0.8em; color: #94a3b8; margin-top: 10px; }
    .error { color: red; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  
  <div id="active-flights">Looking for flights...</div>
  
  <div style="text-align: center;">
    <button id="toggle-archive-btn" class="btn-secondary" style="display: none;" onclick="toggleArchive()">📁 Show Completed Flights</button>
  </div>

  <div id="archive-wrapper">
    <h2 class="section-divider"><span>Completed Flights</span></h2>
    <div id="archived-flights"></div>
  </div>
  
  <div class="controls">
    <button onclick="render()">🔄 Refresh Status</button>
    <div class="sync-text" id="sync-timer">Next auto-sync in 60s</div>
    <div class="sync-text" id="timestamp"></div>
  </div>

  <script>
    // Smarter logo matcher that groups by exact matches and partial matches
    const AIRLINE_LOGOS = [
      { names: ['UNITED', 'UA', 'UAL'], url: 'https://upload.wikimedia.org/wikipedia/en/thumb/e/e0/United_Airlines_Logo.svg/100px-United_Airlines_Logo.svg.png' },
      { names: ['DELTA', 'DL', 'DAL'], url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d1/Delta_logo.svg/100px-Delta_logo.svg.png' },
      { names: ['AMERICAN', 'AA', 'AAL'], url: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/27/American_Airlines_logo_2013.svg/100px-American_Airlines_logo_2013.svg.png' },
      { names: ['SOUTHWEST', 'WN', 'SWA'], url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Southwest_Airlines_logo_2014.svg/100px-Southwest_Airlines_logo_2014.svg.png' },
      { names: ['JETBLUE', 'B6', 'JBU'], url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/JetBlue_Airways_Logo.svg/100px-JetBlue_Airways_Logo.svg.png' },
      { names: ['ALASKA', 'AS', 'ASA'], url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Alaska_Airlines_logo.svg/100px-Alaska_Airlines_logo.svg.png' },
      { names: ['SPIRIT', 'NK', 'NKS'], url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Spirit_Airlines_logo.svg/100px-Spirit_Airlines_logo.svg.png' }
    ];

    let countdown = 60;
    let timerInterval;

    function toggleArchive() {
      const wrapper = document.getElementById('archive-wrapper');
      const btn = document.getElementById('toggle-archive-btn');
      if (wrapper.style.display === 'none' || wrapper.style.display === '') {
        wrapper.style.display = 'block';
        btn.innerHTML = '📁 Hide Completed Flights';
      } else {
        wrapper.style.display = 'none';
        btn.innerHTML = '📁 Show Completed Flights';
      }
    }

    function getProgress(dep, arr, arrivedManual, percentManual) {
      if (percentManual !== "" && parseInt(percentManual) > 0) return parseInt(percentManual);
      const isArrivedChecked = (arrivedManual === true || String(arrivedManual).toUpperCase() === "YES");
      if (isArrivedChecked) return 100;

      const now = new Date().getTime();
      if (now < dep) return 0;
      
      const total = arr - dep;
      const elapsed = now - dep;
      let percent = Math.floor((elapsed / total) * 100);

      if (percent >= 100 && !isArrivedChecked) return 99;
      return percent;
    }

    function render() {
      countdown = 60;
      google.script.run.withSuccessHandler(data => {
          const activeContainer = document.getElementById('active-flights');
          const archivedContainer = document.getElementById('archived-flights');
          const archiveBtn = document.getElementById('toggle-archive-btn');
          
          if (data.error) { activeContainer.innerHTML = `<div class="error">${data.error}</div>`; return; }
          if (data.flights.length === 0) { activeContainer.innerHTML = `<div class="status-footer">No flights found.</div>`; return; }

          const now = new Date().getTime();
          const ONE_DAY_MS = 24 * 60 * 60 * 1000;

          let activeHtmlArray = [];
          let archivedFlightsArray = [];

          data.flights.forEach(f => {
            const percent = getProgress(f.depRaw, f.arrRaw, f.arrivedManual, f.percentManual);
            const isOld = (percent === 100 && (now - f.arrRaw) > ONE_DAY_MS);

            let progressClass = 'flying'; 
            let footerText = '📡 IN FLIGHT: ' + percent + '%';
            
            if (percent === 0) footerText = '🕒 NOT STARTED';
            else if (percent === 99) { progressClass = 'tarmac'; footerText = '🛬 TAXIING / TARMAC'; } 
            else if (percent === 100) { progressClass = 'arrived'; footerText = '✅ ARRIVED AT GATE'; }

            const statusStr = f.status ? f.status.toUpperCase() : "ON TIME";
            let badgeClass = "badge-status-neutral"; 
            let isCancelled = false;

            if (statusStr.includes("DELAY") || statusStr.includes("CANCEL")) badgeClass = "badge-status-alert"; 
            if (statusStr.includes("CANCEL")) {
               isCancelled = true;
               progressClass = 'cancelled';
               footerText = '❌ FLIGHT CANCELLED';
            }

            let headerBadge = '';
            const isActiveFlight = percent > 0 && percent < 100 && !isCancelled;
            if (isActiveFlight) headerBadge = `<span class="badge badge-live">LIVE</span>`;
            else if (percent === 100) headerBadge = `<span class="badge badge-completed">COMPLETED</span>`;

            // NEW LOGO MATCHING LOGIC
            const companyStr = (f.company || "").toUpperCase().trim();
            let logoSrc = '';
            
            for (const airline of AIRLINE_LOGOS) {
              // Exact match or includes full name (ignores short codes like "AA" embedded in other words)
              if (airline.names.some(name => companyStr === name || (name.length > 2 && companyStr.includes(name)))) {
                logoSrc = airline.url;
                break;
              }
            }

            // HTML for the logo - Includes an 'onerror' to remove the image box entirely if the URL breaks
            const imageHtml = logoSrc 
              ? `<img src="${logoSrc}" class="logo" onerror="this.style.display='none'">` 
              : '✈️';

            const cardHtml = `
              <div class="card ${isActiveFlight ? 'active' : ''} ${isOld ? 'archived' : ''}">
                <div class="top-bar ${isOld ? 'archived-header' : ''}">
                  <div class="airline-brand">
                    ${imageHtml}
                    <span class="airline-info">${f.company || 'Unknown Airline'} · ${f.flightNo || ''}</span>
                  </div>
                  <div class="badge-container">
                    ${headerBadge}
                    <span class="badge ${badgeClass}">${statusStr}</span>
                  </div>
                </div>
                <div class="date-row">📅 ${f.dateText}</div>
                <div class="airport-row">
                  <div class="point"><span class="city-code">${f.from}</span><span class="time">${f.depTimeText}</span></div>
                  <div class="point dest"><span class="city-code">${f.to}</span><span class="time">${f.arrTimeText}</span></div>
                </div>
                <div class="progress-row">
                  <div class="progress-track">
                    <div class="progress-fill ${progressClass}" style="width: ${isCancelled ? 100 : percent}%"></div>
                    <div class="plane-marker" style="left: ${isCancelled ? 100 : percent}%">${isCancelled ? '❌' : '✈️'}</div>
                  </div>
                </div>
                <div class="status-footer">${footerText}</div>
              </div>`;

            if (isOld) {
              archivedFlightsArray.push({ html: cardHtml, arrTime: f.arrRaw });
            } else {
              activeHtmlArray.push(cardHtml);
            }
          });

          // Sort archived flights by arrival time descending (newest first)
          archivedFlightsArray.sort((a, b) => b.arrTime - a.arrTime);

          const activeHtml = activeHtmlArray.join('');
          const archivedHtml = archivedFlightsArray.map(item => item.html).join('');

          activeContainer.innerHTML = activeHtml || '<div class="status-footer">No active flights.</div>';
          
          if (archivedHtml) {
            archivedContainer.innerHTML = archivedHtml;
            archiveBtn.style.display = 'inline-block';
          } else {
            archiveBtn.style.display = 'none';
            document.getElementById('archive-wrapper').style.display = 'none';
          }

          document.getElementById('timestamp').innerHTML = "Last Sync: " + data.updated;
        }).getFlightData();
    }

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      countdown--;
      if (countdown <= 0) render();
      else document.getElementById('sync-timer').innerHTML = "Next auto-sync in " + countdown + "s";
    }, 1000);

    render();
  </script>
</body>
</html>
